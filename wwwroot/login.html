<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – BugTracker</title>
  <meta name="description" content="Sign in to BugTracker to manage and track issues." />
  <link rel="stylesheet" href="/css/site.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fa-solid fa-bug"></i></div>
      <span class="auth-logo-text">BugTracker</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <div id="alert-container"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;">
        Sign in
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="/register.html">Create one</a>
    </p>
  </div>
</div>
<script src="/js/auth.js"></script>
<script>
  Auth.requireGuest();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert('alert-container');
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const res = await api.post('/auth/login', {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });
      Auth.save(res.data);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert('alert-container', err.message);
      btn.disabled = false;
      btn.innerHTML = 'Sign in';
    }
  });
</script>
</body>
</html>
