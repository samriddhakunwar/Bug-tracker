<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Issue Detail – BugTracker</title>
  <meta name="description" content="View issue details, comments, attachments, and activity history." />
  <link rel="stylesheet" href="/css/site.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .issue-header { margin-bottom: 24px; }
    .issue-title  { font-size: 22px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; }
    .issue-meta   { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .meta-item    { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray-500); }
    .detail-grid  { display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-items: start; }
    .comment-item { padding: 14px 0; border-bottom: 1px solid var(--gray-100); }
    .comment-item:last-child { border-bottom: none; }
    .comment-author { font-weight: 600; font-size: 13px; }
    .comment-time   { font-size: 11px; color: var(--gray-400); margin-left: 8px; }
    .comment-body   { margin-top: 6px; font-size: 13px; color: var(--gray-700); line-height: 1.6; white-space: pre-wrap; }
    .attachment-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
    .attachment-item:last-child { border-bottom: none; }
    .attachment-icon { width: 36px; height: 36px; background: var(--gray-100); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 16px; flex-shrink: 0; }
    .attachment-name { font-size: 13px; font-weight: 500; }
    .attachment-size { font-size: 11px; color: var(--gray-400); }
    @media(max-width:900px){ .detail-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="/dashboard.html">
      <div class="brand-icon"><i class="fa-solid fa-bug"></i></div>
      <span>BugTracker</span>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="/dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="/issues.html"><i class="fa-solid fa-list-check"></i> Issues</a>
      <a href="/users.html" class="admin-only"><i class="fa-solid fa-users"></i> Users</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sb-avatar">U</div>
        <div>
          <div class="user-name" id="sb-username">Loading…</div>
          <div class="user-role" id="sb-role"></div>
        </div>
        <button class="btn-logout" onclick="Auth.logout()" title="Sign out">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="d-flex align-center gap-12">
        <a href="/issues.html" class="btn btn-secondary btn-sm">
          <i class="fa-solid fa-arrow-left"></i> Back
        </a>
        <span class="topbar-title" id="topbar-issue-id">Issue</span>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <main class="page-body">
      <div id="alert-container"></div>
      <div id="page-loading" class="empty-state"><span class="spinner"></span></div>
      <div id="page-content" style="display:none;">

        <!-- Issue Header -->
        <div class="issue-header">
          <h1 class="issue-title" id="issue-title"></h1>
          <div class="issue-meta">
            <div class="meta-item" id="meta-status"></div>
            <div class="meta-item" id="meta-priority"></div>
            <div class="meta-item" id="meta-severity"></div>
            <div class="meta-item"><i class="fa-solid fa-user"></i> <span id="meta-assignee">Unassigned</span></div>
            <div class="meta-item"><i class="fa-regular fa-calendar"></i> <span id="meta-created"></span></div>
          </div>
        </div>

        <div class="detail-grid">
          <!-- Left column -->
          <div>
            <!-- Description -->
            <div class="card" style="margin-bottom:20px;">
              <div class="card-header"><span class="card-title">Description</span></div>
              <div class="card-body">
                <p id="issue-description" style="font-size:13px;color:var(--gray-700);line-height:1.7;white-space:pre-wrap;"></p>
              </div>
            </div>

            <!-- Comments -->
            <div class="card" style="margin-bottom:20px;">
              <div class="card-header"><span class="card-title">Comments</span></div>
              <div class="card-body" style="padding-bottom:0;">
                <div id="comments-list"></div>
              </div>
              <div style="padding:16px 20px;border-top:1px solid var(--gray-100);">
                <div id="comment-alert"></div>
                <textarea id="comment-input" class="form-control" placeholder="Write a comment…" rows="3"></textarea>
                <button class="btn btn-primary btn-sm" id="btn-add-comment" style="margin-top:10px;">
                  <i class="fa-solid fa-paper-plane"></i> Post Comment
                </button>
              </div>
            </div>

            <!-- Attachments -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">Attachments</span>
                <label class="btn btn-secondary btn-sm" style="cursor:pointer;">
                  <i class="fa-solid fa-upload"></i> Upload
                  <input type="file" id="attachment-input" style="display:none;" accept=".jpg,.jpeg,.png,.gif,.pdf,.txt,.log,.zip" />
                </label>
              </div>
              <div class="card-body">
                <div id="attachments-list">
                  <div class="empty-state" style="padding:20px;"><i class="fa-regular fa-file"></i> No attachments yet</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right column -->
          <div>
            <!-- Details -->
            <div class="card" style="margin-bottom:20px;">
              <div class="card-header"><span class="card-title">Details</span></div>
              <div class="card-body">
                <table style="width:100%;font-size:13px;border-collapse:collapse;">
                  <tr style="border-bottom:1px solid var(--gray-100);">
                    <td style="padding:8px 0;color:var(--gray-500);width:90px;">Reporter</td>
                    <td style="padding:8px 0;font-weight:500;" id="det-reporter"></td>
                  </tr>
                  <tr style="border-bottom:1px solid var(--gray-100);">
                    <td style="padding:8px 0;color:var(--gray-500);">Created</td>
                    <td style="padding:8px 0;" id="det-created"></td>
                  </tr>
                  <tr style="border-bottom:1px solid var(--gray-100);">
                    <td style="padding:8px 0;color:var(--gray-500);">Updated</td>
                    <td style="padding:8px 0;" id="det-updated"></td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;color:var(--gray-500);">Comments</td>
                    <td style="padding:8px 0;" id="det-comments"></td>
                  </tr>
                </table>
              </div>
            </div>

            <!-- Activity Log -->
            <div class="card">
              <div class="card-header"><span class="card-title">Activity</span></div>
              <div class="card-body">
                <ul class="timeline" id="activity-list">
                  <li style="color:var(--gray-400);font-size:13px;">No activity yet.</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Edit Issue Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Issue</span>
      <button class="modal-close" id="edit-modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="edit-modal-alert"></div>
      <form id="edit-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="edit-title">Title</label>
          <input id="edit-title" type="text" class="form-control" required maxlength="300" />
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-description">Description</label>
          <textarea id="edit-description" class="form-control" rows="4"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="edit-status">Status</label>
            <select id="edit-status" class="form-select">
              <option value="0">Open</option>
              <option value="1">In Progress</option>
              <option value="2">Resolved</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="edit-priority">Priority</label>
            <select id="edit-priority" class="form-select">
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="edit-severity">Severity</label>
            <select id="edit-severity" class="form-select">
              <option value="0">Minor</option>
              <option value="1">Major</option>
              <option value="2">Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="edit-assigned">Assign To</label>
            <select id="edit-assigned" class="form-select">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="edit-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="edit-modal-save">Save Changes</button>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/issue-detail.js"></script>
</body>
</html>
